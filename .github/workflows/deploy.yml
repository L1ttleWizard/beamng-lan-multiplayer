name: Deploy Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod Zip
        run: |
          zip -r beamng_lan_multiplayer.zip . -x "*.git*" -x "*.github*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            beamng_lan_multiplayer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
